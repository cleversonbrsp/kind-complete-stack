kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: k8s-local-cluster
nodes:
- role: control-plane
  extraPortMappings:
    - containerPort: 80
      hostPort: 8080
    - containerPort: 443
      hostPort: 8443
- role: worker
- role: worker
networking:
  disableDefaultCNI: false
  apiServerAddress: "127.0.0.1"
  apiServerPort: 6443
